id: no-getattr-in-wrap-builtin-theme
language: Python
severity: error
message: "_wrap_builtin_theme should use Theme dataclass attributes directly instead of getattr()."
files:
  - src/tunacode/constants.py
rule:
  all:
    - pattern: getattr($$$ARGS)
    - inside:
        stopBy: end
        pattern: |
          def _wrap_builtin_theme($$$PARAMS):
              $$$BODY
